name: Scrape Cardmarket prices

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connexion à Tailscale (routage via le téléphone)
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: --exit-node=${{ secrets.TS_EXIT_NODE }} --exit-node-allow-lan-access --accept-routes

      - name: Vérifier l'IP de sortie
        run: |
          echo "IP de sortie vue depuis Internet :"
          curl -s --max-time 30 https://api.ipify.org || echo "(échec de la vérification IP)"
          echo ""

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --cached --quiet && echo "Aucun changement" || git commit -m "Mise à jour des prix"
          git push
