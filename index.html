<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi prix Cardmarket - FAB</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0f1115;
    --card-bg: #1a1d24;
    --text: #e8e8ea;
    --text-dim: #9a9ea8;
    --accent: #5b8cff;
    --green: #2ecc71;
    --green-bg: rgba(46, 204, 113, 0.12);
    --border: #2a2e37;
    --owned: #f5a623;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px;
    padding-bottom: 48px;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  h1 {
    font-size: 1.3rem;
    margin: 0 0 4px;
  }
  .settings-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 10px;
    padding: 6px 10px;
    font-size: 1rem;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 14px;
  }
  .controls {
    margin-bottom: 16px;
  }
  .search-input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 0.9rem;
    margin-bottom: 10px;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 0.8rem;
  }
  .filter-btn.active {
    background: var(--accent);
    color: #0f1115;
    border-color: var(--accent);
    font-weight: 600;
  }
  .filter-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 8px;
  }
  .filter-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .chip {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 20px;
    padding: 5px 11px;
    font-size: 0.78rem;
  }
  .chip.active {
    background: var(--accent);
    color: #0f1115;
    border-color: var(--accent);
    font-weight: 600;
  }
  .chip.rarity-chip.active {
    background: var(--owned);
    border-color: var(--owned);
  }
  .sort-group {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
  }
  .sort-select {
    flex: 1;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 0.82rem;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .card.hit {
    border-color: var(--green);
    background: var(--green-bg);
  }
  .card.owned {
    opacity: 0.55;
  }
  .thumb {
    width: 46px;
    height: 64px;
    object-fit: cover;
    border-radius: 6px;
    background: var(--border);
    flex-shrink: 0;
  }
  .card-main {
    flex: 1;
    min-width: 0;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-name {
    font-size: 0.95rem;
    font-weight: 600;
    margin: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .badges {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }
  .badge {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge.hit {
    background: var(--green);
    color: #0f1115;
  }
  .badge.miss {
    background: var(--border);
    color: var(--text-dim);
  }
  .badge.rarity {
    background: #33261a;
    color: #e8a94c;
  }
  .price-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .price-current {
    font-size: 1.3rem;
    font-weight: 700;
  }
  .price-current.hit { color: var(--green); }
  .price-target {
    font-size: 0.78rem;
    color: var(--text-dim);
  }
  .meta {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .no-data {
    color: var(--text-dim);
    font-size: 0.8rem;
    font-style: italic;
  }
  .empty {
    color: var(--text-dim);
    text-align: center;
    padding: 40px 20px;
    font-size: 0.9rem;
  }
  .load-more {
    display: block;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--accent);
    font-size: 0.9rem;
    margin-top: 8px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open {
    display: flex;
  }
  .modal {
    background: var(--card-bg);
    border-radius: 18px 18px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 92vh;
    overflow-y: auto;
  }
  .modal-close {
    display: block;
    margin-left: auto;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.3rem;
    padding: 4px 8px;
  }
  .modal-top {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .modal-image {
    width: 120px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  .modal-name {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 0 0 6px;
  }
  .modal-chart-wrap {
    height: 200px;
    margin-top: 16px;
  }
  .modal-section {
    margin-top: 18px;
  }
  .modal-label {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: block;
  }
  .alert-row {
    display: flex;
    gap: 8px;
  }
  .alert-input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
  }
  .alert-save-btn {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #0f1115;
    font-weight: 600;
    font-size: 0.85rem;
  }
  .modal-footer {
    margin-top: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .cm-link {
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
  }
  .own-btn {
    font-size: 0.8rem;
    border-radius: 20px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
  }
  .own-btn.owned {
    background: var(--owned);
    border-color: var(--owned);
    color: #0f1115;
    font-weight: 600;
  }
  .legend-row {
    display: flex;
    gap: 14px;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 6px;
  }
  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
</style>
</head>
<body>
  <div class="top-row">
    <div>
      <h1>Suivi prix Flesh and Blood</h1>
      <div class="subtitle" id="subtitle">Chargement...</div>
    </div>
    <button class="settings-btn" id="settingsBtn">&#9881;</button>
  </div>

  <div class="controls">
    <input class="search-input" id="searchInput" placeholder="Rechercher une carte...">
    <div class="filter-row" id="filterRow">
      <button class="filter-btn" data-filter="not_owned">Non possédées</button>
      <button class="filter-btn" data-filter="all">Toutes</button>
      <button class="filter-btn" data-filter="owned">Possédées</button>
    </div>
    <div class="filter-group" id="rarityRow">
      <span class="filter-label">Rareté</span>
      <button class="chip rarity-chip" data-rarity="Majestic">Majestic</button>
      <button class="chip rarity-chip" data-rarity="Legendary">Legendary</button>
      <button class="chip rarity-chip" data-rarity="Fabled">Fabled</button>
    </div>
    <div class="filter-group" id="boolRow">
      <button class="chip" data-bool="alert_hit">⚡ Alerte atteinte</button>
      <button class="chip" data-bool="watchlist">★ Ma watchlist</button>
      <button class="chip" data-bool="has_price">Prix connu</button>
    </div>
    <div class="sort-group">
      <label class="filter-label" for="sortSelect">Trier</label>
      <select class="sort-select" id="sortSelect">
        <option value="name">Nom (A → Z)</option>
        <option value="price_asc">Prix croissant</option>
        <option value="price_desc">Prix décroissant</option>
        <option value="drop">Plus forte baisse récente</option>
      </select>
    </div>
  </div>

  <div id="cards"></div>
  <button class="load-more" id="loadMoreBtn" style="display:none;">Charger plus de cartes</button>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

<script>
const REPO = 'ColinCamille/fab-cardmarket-tracker';
const BRANCH = 'master';
const PAGE_SIZE = 60;

let allCards = [];
let prices = {};
let ownedSet = new Set();
let alerts = {};
let filter = 'not_owned';
let searchText = '';
let rarityFilter = new Set();
let boolFilters = new Set();
let sortMode = 'name';
let renderedCount = PAGE_SIZE;

function getToken() { return localStorage.getItem('gh_token') || ''; }
function setToken(t) { localStorage.setItem('gh_token', t); }

function promptForToken() {
  const current = getToken();
  const value = window.prompt(
    "Token GitHub (scope 'repo') pour pouvoir marquer des cartes ou régler des alertes.\n" +
    "Crée-le sur github.com/settings/tokens/new si besoin.\n" +
    "Laisse vide pour ne rien changer.",
    current
  );
  if (value !== null && value.trim() !== '') {
    setToken(value.trim());
  }
}

async function githubGetFile(path) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}&_=${Date.now()}`, {
    headers: { Authorization: `token ${getToken()}` }
  });
  if (!res.ok) throw new Error('Lecture impossible (' + res.status + ')');
  return res.json();
}

function b64EncodeUnicode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64DecodeUnicode(str) {
  return decodeURIComponent(escape(atob(str)));
}

async function githubPutFile(path, contentObj, sha, message) {
  const content = b64EncodeUnicode(JSON.stringify(contentObj, null, 2));
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: {
      Authorization: `token ${getToken()}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ message, content, sha, branch: BRANCH })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || ('Échec (' + res.status + ')'));
  }
  return res.json();
}

async function toggleOwned(cardId) {
  if (!getToken()) {
    promptForToken();
    if (!getToken()) return;
  }
  try {
    const file = await githubGetFile('collection.json');
    const current = JSON.parse(b64DecodeUnicode(file.content));
    const set = new Set(current.possedees || []);
    const willOwn = !set.has(cardId);
    if (willOwn) set.add(cardId); else set.delete(cardId);
    current.possedees = Array.from(set);
    await githubPutFile('collection.json', current, file.sha,
      (willOwn ? 'Ajout' : 'Retrait') + ' collection: ' + cardId);
    ownedSet = set;
    renderAll();
    openModal(cardId); // refresh modal state (button label)
  } catch (e) {
    alert("Erreur lors de la mise à jour de la collection :\n" + e.message);
  }
}

async function saveAlert(cardId, value) {
  if (!getToken()) {
    promptForToken();
    if (!getToken()) return;
  }
  const price = value.trim() === '' ? null : parseFloat(value.replace(',', '.'));
  if (value.trim() !== '' && (isNaN(price) || price < 0)) {
    alert('Prix invalide.');
    return;
  }
  try {
    const file = await githubGetFile('alertes.json');
    const current = JSON.parse(b64DecodeUnicode(file.content));
    // On stocke explicitement `null` (plutôt que de supprimer la clé) pour pouvoir
    // annuler un prix_cible défini "en dur" dans cards.json.
    current[cardId] = price;
    await githubPutFile('alertes.json', current, file.sha,
      'Alerte prix: ' + cardId + ' -> ' + (price === null ? 'suppression' : price));
    alerts = current;
    renderAll();
    openModal(cardId);
  } catch (e) {
    alert("Erreur lors de l'enregistrement de l'alerte :\n" + e.message);
  }
}

async function loadData() {
  const [cardsRes, catalogRes, pricesRes, collectionRes, alertsRes] = await Promise.all([
    fetch('cards.json?_=' + Date.now()),
    fetch('catalog.json?_=' + Date.now()).catch(() => null),
    fetch('prices.json?_=' + Date.now()),
    fetch('collection.json?_=' + Date.now()).catch(() => null),
    fetch('alertes.json?_=' + Date.now()).catch(() => null),
  ]);
  const cards = await cardsRes.json();
  const catalog = (catalogRes && catalogRes.ok) ? await catalogRes.json() : [];
  prices = await pricesRes.json();
  const collection = (collectionRes && collectionRes.ok) ? await collectionRes.json() : { possedees: [] };
  ownedSet = new Set(collection.possedees || []);
  alerts = (alertsRes && alertsRes.ok) ? await alertsRes.json() : {};

  allCards = cards.map(c => ({ ...c, source: 'manuel' }))
    .concat(catalog.map(c => ({ ...c, source: 'catalogue' })));

  setupControls();
  renderAll();
}

function setupControls() {
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchText = e.target.value.trim().toLowerCase();
    renderedCount = PAGE_SIZE;
    renderAll();
  });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      renderedCount = PAGE_SIZE;
      renderAll();
    });
  });
  document.querySelectorAll('.rarity-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const r = btn.dataset.rarity;
      if (rarityFilter.has(r)) rarityFilter.delete(r); else rarityFilter.add(r);
      renderedCount = PAGE_SIZE;
      renderAll();
    });
  });
  document.querySelectorAll('[data-bool]').forEach(btn => {
    btn.addEventListener('click', () => {
      const b = btn.dataset.bool;
      if (boolFilters.has(b)) boolFilters.delete(b); else boolFilters.add(b);
      renderedCount = PAGE_SIZE;
      renderAll();
    });
  });
  document.getElementById('sortSelect').addEventListener('change', (e) => {
    sortMode = e.target.value;
    renderedCount = PAGE_SIZE;
    renderAll();
  });
  document.getElementById('settingsBtn').addEventListener('click', promptForToken);
  document.getElementById('loadMoreBtn').addEventListener('click', () => {
    renderedCount += PAGE_SIZE;
    renderAll();
  });
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') closeModal();
  });
  updateFilterButtons();
}

function updateFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  document.querySelectorAll('.rarity-chip').forEach(btn => {
    btn.classList.toggle('active', rarityFilter.has(btn.dataset.rarity));
  });
  document.querySelectorAll('[data-bool]').forEach(btn => {
    btn.classList.toggle('active', boolFilters.has(btn.dataset.bool));
  });
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
    ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function getAlertPrice(card) {
  // Une entrée explicite dans alertes.json (même null) prend le pas sur prix_cible,
  // pour permettre d'annuler une alerte définie "en dur" dans cards.json.
  if (Object.prototype.hasOwnProperty.call(alerts, card.id)) {
    return alerts[card.id];
  }
  return card.prix_cible != null ? card.prix_cible : null;
}

function getHistory(card) {
  return (prices[card.id] || []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));
}

function getLatest(card) {
  const h = getHistory(card);
  return h.length ? h[h.length - 1] : null;
}

function hasAlert(card) {
  return getAlertPrice(card) != null;
}

function isAlertHit(card) {
  const latest = getLatest(card);
  const target = getAlertPrice(card);
  return latest && target != null && latest.prix_min <= target;
}

function getRecentDropPct(card) {
  const h = getHistory(card);
  if (h.length < 2) return Infinity; // pas d'info -> classées en dernier
  const prev = h[h.length - 2].prix_min;
  const last = h[h.length - 1].prix_min;
  if (!prev) return Infinity;
  return (last - prev) / prev; // négatif = baisse
}

function getFilteredCards() {
  const list = allCards.filter(card => {
    const owned = ownedSet.has(card.id);
    if (filter === 'owned' && !owned) return false;
    if (filter === 'not_owned' && owned) return false;
    if (searchText && !card.nom.toLowerCase().includes(searchText)) return false;
    if (rarityFilter.size && card.rarete && !rarityFilter.has(card.rarete)) return false;
    if (boolFilters.has('has_price') && !getLatest(card)) return false;
    if (boolFilters.has('watchlist') && !hasAlert(card)) return false;
    if (boolFilters.has('alert_hit') && !isAlertHit(card)) return false;
    return true;
  });
  return sortCards(list);
}

function sortCards(list) {
  const sorted = list.slice();
  if (sortMode === 'name') {
    sorted.sort((a, b) => a.nom.localeCompare(b.nom, 'fr'));
  } else if (sortMode === 'price_asc' || sortMode === 'price_desc') {
    sorted.sort((a, b) => {
      const pa = getLatest(a) ? getLatest(a).prix_min : null;
      const pb = getLatest(b) ? getLatest(b).prix_min : null;
      if (pa == null && pb == null) return a.nom.localeCompare(b.nom, 'fr');
      if (pa == null) return 1;   // sans prix -> en dernier
      if (pb == null) return -1;
      return sortMode === 'price_asc' ? pa - pb : pb - pa;
    });
  } else if (sortMode === 'drop') {
    sorted.sort((a, b) => {
      const da = getRecentDropPct(a);
      const db = getRecentDropPct(b);
      if (da === db) return a.nom.localeCompare(b.nom, 'fr');
      return da - db; // plus négatif (plus forte baisse) en premier
    });
  }
  return sorted;
}

function renderAll() {
  updateFilterButtons();
  const container = document.getElementById('cards');
  const subtitle = document.getElementById('subtitle');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  if (!allCards.length) {
    subtitle.textContent = 'Aucune carte suivie';
    container.innerHTML = '<div class="empty">Ajoute une carte dans cards.json pour commencer.</div>';
    loadMoreBtn.style.display = 'none';
    return;
  }

  const filtered = getFilteredCards();
  subtitle.textContent = filtered.length + ' / ' + allCards.length + ' cartes (' + ownedSet.size + ' possédées)';

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">Aucune carte ne correspond.</div>';
    loadMoreBtn.style.display = 'none';
    return;
  }

  const toShow = filtered.slice(0, renderedCount);
  container.innerHTML = '';

  toShow.forEach((card) => {
    const history = (prices[card.id] || []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));
    const latest = history.length ? history[history.length - 1] : null;
    const target = getAlertPrice(card);
    const hit = latest && target != null && latest.prix_min <= target;
    const owned = ownedSet.has(card.id);

    const el = document.createElement('div');
    el.className = 'card' + (hit ? ' hit' : '') + (owned ? ' owned' : '');
    el.dataset.id = card.id;

    el.innerHTML = `
      ${card.image ? `<img class="thumb" src="${card.image}" loading="lazy" alt="">` : '<div class="thumb"></div>'}
      <div class="card-main">
        <div class="card-header">
          <p class="card-name">${card.nom}</p>
          <div class="badges">
            ${card.rarete ? `<span class="badge rarity">${card.rarete}</span>` : ''}
            ${latest && target != null ? `<span class="badge ${hit ? 'hit' : 'miss'}">${hit ? 'Alerte atteinte' : 'Au-dessus'}</span>` : ''}
          </div>
        </div>
        ${latest ? `
          <div class="price-row">
            <span class="price-current ${hit ? 'hit' : ''}">${latest.prix_min.toFixed(2)} €</span>
            ${target != null ? `<span class="price-target">alerte : ${target.toFixed(2)} €</span>` : ''}
          </div>
          <div class="meta">maj ${formatDate(latest.date)}</div>
        ` : `
          <div class="no-data">Pas encore de données.</div>
        `}
      </div>
    `;
    container.appendChild(el);
    el.addEventListener('click', () => openModal(card.id));
  });

  loadMoreBtn.style.display = filtered.length > renderedCount ? 'block' : 'none';
}

function openModal(cardId) {
  const card = allCards.find(c => c.id === cardId);
  if (!card) return;

  const history = (prices[card.id] || []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));
  const latest = history.length ? history[history.length - 1] : null;
  const target = getAlertPrice(card);
  const hit = latest && target != null && latest.prix_min <= target;
  const owned = ownedSet.has(card.id);

  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <button class="modal-close" id="modalCloseBtn">&times;</button>
    <div class="modal-top">
      ${card.image ? `<img class="modal-image" src="${card.image}" alt="">` : ''}
      <div>
        <p class="modal-name">${card.nom}</p>
        ${card.rarete ? `<span class="badge rarity">${card.rarete}</span>` : ''}
        ${latest ? `
          <div class="price-row">
            <span class="price-current ${hit ? 'hit' : ''}">${latest.prix_min.toFixed(2)} €</span>
          </div>
          <div class="meta">${latest.nb_vendeurs != null ? latest.nb_vendeurs + ' vendeurs · ' : ''}maj ${formatDate(latest.date)}</div>
        ` : '<div class="no-data">Pas encore de données.</div>'}
      </div>
    </div>

    ${history.length > 1 ? `
      <div class="modal-chart-wrap"><canvas id="modalChart"></canvas></div>
      <div class="legend-row">
        <span><span class="legend-dot" style="background:#5b8cff;"></span>Prix min</span>
        <span><span class="legend-dot" style="background:#f5a623;"></span>Prix moyen (tendance)</span>
        ${target != null ? `<span><span class="legend-dot" style="background:#2ecc71;"></span>Alerte</span>` : ''}
      </div>
    ` : ''}

    <div class="modal-section">
      <label class="modal-label">Alerte de prix (te prévient visuellement quand le prix min descend à ce niveau ou en dessous)</label>
      <div class="alert-row">
        <input class="alert-input" id="alertInput" type="number" step="0.01" min="0" placeholder="ex: 5.00" value="${target != null ? target : ''}">
        <button class="alert-save-btn" id="alertSaveBtn">Enregistrer</button>
      </div>
    </div>

    <div class="modal-footer">
      <a class="cm-link" href="${card.url}" target="_blank" rel="noopener">Voir sur Cardmarket &rarr;</a>
      <button class="own-btn ${owned ? 'owned' : ''}" id="modalOwnBtn">${owned ? '✓ Possédée' : 'Marquer possédée'}</button>
    </div>
  `;

  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  document.getElementById('modalOwnBtn').addEventListener('click', () => toggleOwned(card.id));
  document.getElementById('alertSaveBtn').addEventListener('click', () => {
    saveAlert(card.id, document.getElementById('alertInput').value);
  });

  document.getElementById('modalOverlay').classList.add('open');

  if (history.length > 1) {
    requestAnimationFrame(() => drawModalChart(history, target));
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function drawModalChart(history, target) {
  const ctx = document.getElementById('modalChart');
  if (!ctx) return;
  const datasets = [
    {
      label: 'Prix min',
      data: history.map(h => h.prix_min),
      borderColor: '#5b8cff',
      backgroundColor: 'rgba(91, 140, 255, 0.1)',
      fill: true,
      tension: 0.25,
      pointRadius: 2,
    }
  ];
  if (history.some(h => h.prix_moyen != null)) {
    datasets.push({
      label: 'Prix moyen',
      data: history.map(h => h.prix_moyen),
      borderColor: '#f5a623',
      fill: false,
      tension: 0.25,
      pointRadius: 2,
    });
  }
  if (target != null) {
    datasets.push({
      label: 'Alerte',
      data: history.map(() => target),
      borderColor: '#2ecc71',
      borderDash: [4, 4],
      pointRadius: 0,
      fill: false,
    });
  }
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.map(h => new Date(h.date).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' })),
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9a9ea8', font: { size: 9 } }, grid: { color: '#2a2e37' } },
        y: { ticks: { color: '#9a9ea8', font: { size: 9 } }, grid: { color: '#2a2e37' } }
      }
    }
  });
}

loadData().catch(err => {
  document.getElementById('subtitle').textContent = 'Erreur de chargement';
  document.getElementById('cards').innerHTML = '<div class="empty">Impossible de charger les données. ' + err.message + '</div>';
});
</script>
</body>
</html>
