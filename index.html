<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi prix Cardmarket - FAB</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0f1115;
    --card-bg: #1a1d24;
    --text: #e8e8ea;
    --text-dim: #9a9ea8;
    --accent: #5b8cff;
    --green: #2ecc71;
    --green-bg: rgba(46, 204, 113, 0.12);
    --border: #2a2e37;
    --owned: #f5a623;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px;
    padding-bottom: 48px;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  h1 {
    font-size: 1.3rem;
    margin: 0 0 4px;
  }
  .settings-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 10px;
    padding: 6px 10px;
    font-size: 1rem;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 14px;
  }
  .controls {
    margin-bottom: 16px;
  }
  .search-input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    font-size: 0.9rem;
    margin-bottom: 10px;
  }
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 0.8rem;
  }
  .filter-btn.active {
    background: var(--accent);
    color: #0f1115;
    border-color: var(--accent);
    font-weight: 600;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .card.hit {
    border-color: var(--green);
    background: var(--green-bg);
  }
  .card.owned {
    opacity: 0.55;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-name {
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0;
  }
  .badges {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .badge {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge.hit {
    background: var(--green);
    color: #0f1115;
  }
  .badge.miss {
    background: var(--border);
    color: var(--text-dim);
  }
  .badge.rarity {
    background: #33261a;
    color: #e8a94c;
  }
  .price-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .price-current {
    font-size: 1.8rem;
    font-weight: 700;
  }
  .price-current.hit { color: var(--green); }
  .price-target {
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .chart-wrap {
    margin-top: 12px;
    height: 120px;
  }
  .card-footer {
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cm-link {
    font-size: 0.8rem;
    color: var(--accent);
    text-decoration: none;
  }
  .cm-link:active { opacity: 0.7; }
  .own-btn {
    font-size: 0.75rem;
    border-radius: 20px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
  }
  .own-btn.owned {
    background: var(--owned);
    border-color: var(--owned);
    color: #0f1115;
    font-weight: 600;
  }
  .empty {
    color: var(--text-dim);
    text-align: center;
    padding: 40px 20px;
    font-size: 0.9rem;
  }
  .no-data {
    color: var(--text-dim);
    font-size: 0.85rem;
    font-style: italic;
  }
  .load-more {
    display: block;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--accent);
    font-size: 0.9rem;
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="top-row">
    <div>
      <h1>Suivi prix Flesh and Blood</h1>
      <div class="subtitle" id="subtitle">Chargement...</div>
    </div>
    <button class="settings-btn" id="settingsBtn">&#9881;</button>
  </div>

  <div class="controls">
    <input class="search-input" id="searchInput" placeholder="Rechercher une carte...">
    <div class="filter-row" id="filterRow">
      <button class="filter-btn" data-filter="not_owned">Non possédées</button>
      <button class="filter-btn" data-filter="all">Toutes</button>
      <button class="filter-btn" data-filter="owned">Possédées</button>
    </div>
  </div>

  <div id="cards"></div>
  <button class="load-more" id="loadMoreBtn" style="display:none;">Charger plus de cartes</button>

<script>
const REPO = 'ColinCamille/fab-cardmarket-tracker';
const BRANCH = 'master';
const PAGE_SIZE = 60;

let allCards = [];
let prices = {};
let ownedSet = new Set();
let filter = 'not_owned';
let searchText = '';
let renderedCount = PAGE_SIZE;

function getToken() { return localStorage.getItem('gh_token') || ''; }
function setToken(t) { localStorage.setItem('gh_token', t); }

function promptForToken() {
  const current = getToken();
  const value = window.prompt(
    "Token GitHub (scope 'repo') pour pouvoir marquer des cartes comme possédées.\n" +
    "Crée-le sur github.com/settings/tokens/new si besoin.\n" +
    "Laisse vide pour ne rien changer.",
    current
  );
  if (value !== null && value.trim() !== '') {
    setToken(value.trim());
  }
}

async function githubGetFile(path) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}?ref=${BRANCH}&_=${Date.now()}`, {
    headers: { Authorization: `token ${getToken()}` }
  });
  if (!res.ok) throw new Error('Lecture impossible (' + res.status + ')');
  return res.json();
}

function b64EncodeUnicode(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64DecodeUnicode(str) {
  return decodeURIComponent(escape(atob(str)));
}

async function githubPutFile(path, contentObj, sha, message) {
  const content = b64EncodeUnicode(JSON.stringify(contentObj, null, 2));
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: {
      Authorization: `token ${getToken()}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ message, content, sha, branch: BRANCH })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || ('Échec (' + res.status + ')'));
  }
  return res.json();
}

async function toggleOwned(cardId) {
  if (!getToken()) {
    promptForToken();
    if (!getToken()) return;
  }
  try {
    const file = await githubGetFile('collection.json');
    const current = JSON.parse(b64DecodeUnicode(file.content));
    const set = new Set(current.possedees || []);
    const willOwn = !set.has(cardId);
    if (willOwn) set.add(cardId); else set.delete(cardId);
    current.possedees = Array.from(set);
    await githubPutFile('collection.json', current, file.sha,
      (willOwn ? 'Ajout' : 'Retrait') + ' collection: ' + cardId);
    ownedSet = set;
    renderAll();
  } catch (e) {
    alert("Erreur lors de la mise à jour de la collection :\n" + e.message);
  }
}

async function loadData() {
  const [cardsRes, catalogRes, pricesRes, collectionRes] = await Promise.all([
    fetch('cards.json?_=' + Date.now()),
    fetch('catalog.json?_=' + Date.now()).catch(() => null),
    fetch('prices.json?_=' + Date.now()),
    fetch('collection.json?_=' + Date.now()).catch(() => null),
  ]);
  const cards = await cardsRes.json();
  const catalog = (catalogRes && catalogRes.ok) ? await catalogRes.json() : [];
  prices = await pricesRes.json();
  const collection = (collectionRes && collectionRes.ok) ? await collectionRes.json() : { possedees: [] };
  ownedSet = new Set(collection.possedees || []);

  allCards = cards.map(c => ({ ...c, source: 'manuel' }))
    .concat(catalog.map(c => ({ ...c, source: 'catalogue' })));

  setupControls();
  renderAll();
}

function setupControls() {
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchText = e.target.value.trim().toLowerCase();
    renderedCount = PAGE_SIZE;
    renderAll();
  });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      renderedCount = PAGE_SIZE;
      renderAll();
    });
  });
  document.getElementById('settingsBtn').addEventListener('click', promptForToken);
  document.getElementById('loadMoreBtn').addEventListener('click', () => {
    renderedCount += PAGE_SIZE;
    renderAll();
  });
  updateFilterButtons();
}

function updateFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
    ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function getFilteredCards() {
  return allCards.filter(card => {
    const owned = ownedSet.has(card.id);
    if (filter === 'owned' && !owned) return false;
    if (filter === 'not_owned' && owned) return false;
    if (searchText && !card.nom.toLowerCase().includes(searchText)) return false;
    return true;
  });
}

function renderAll() {
  updateFilterButtons();
  const container = document.getElementById('cards');
  const subtitle = document.getElementById('subtitle');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  if (!allCards.length) {
    subtitle.textContent = 'Aucune carte suivie';
    container.innerHTML = '<div class="empty">Ajoute une carte dans cards.json pour commencer.</div>';
    loadMoreBtn.style.display = 'none';
    return;
  }

  const filtered = getFilteredCards();
  subtitle.textContent = filtered.length + ' / ' + allCards.length + ' cartes (' + ownedSet.size + ' possédées)';

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">Aucune carte ne correspond.</div>';
    loadMoreBtn.style.display = 'none';
    return;
  }

  const toShow = filtered.slice(0, renderedCount);
  container.innerHTML = '';

  toShow.forEach((card, index) => {
    const history = (prices[card.id] || []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));
    const latest = history.length ? history[history.length - 1] : null;
    const hasTarget = card.prix_cible != null;
    const hit = latest && hasTarget && latest.prix_min <= card.prix_cible;
    const owned = ownedSet.has(card.id);

    const el = document.createElement('div');
    el.className = 'card' + (hit ? ' hit' : '') + (owned ? ' owned' : '');

    const chartId = 'chart-' + index;

    el.innerHTML = `
      <div class="card-header">
        <p class="card-name">${card.nom}</p>
        <div class="badges">
          ${card.rarete ? `<span class="badge rarity">${card.rarete}</span>` : ''}
          ${latest && hasTarget ? `<span class="badge ${hit ? 'hit' : 'miss'}">${hit ? 'Prix cible atteint' : 'Au-dessus de la cible'}</span>` : ''}
        </div>
      </div>
      ${latest ? `
        <div class="price-row">
          <span class="price-current ${hit ? 'hit' : ''}">${latest.prix_min.toFixed(2)} €</span>
          ${hasTarget ? `<span class="price-target">cible : ${card.prix_cible.toFixed(2)} €</span>` : ''}
        </div>
        <div class="meta">${latest.nb_vendeurs != null ? latest.nb_vendeurs + ' vendeurs · ' : ''}maj ${formatDate(latest.date)}</div>
        ${history.length > 1 ? `<div class="chart-wrap"><canvas id="${chartId}"></canvas></div>` : ''}
      ` : `
        <div class="no-data">Pas encore de données pour cette carte.</div>
        ${hasTarget ? `<div class="price-target">cible : ${card.prix_cible.toFixed(2)} €</div>` : ''}
      `}
      <div class="card-footer">
        <a class="cm-link" href="${card.url}" target="_blank" rel="noopener">Voir sur Cardmarket &rarr;</a>
        <button class="own-btn ${owned ? 'owned' : ''}" data-id="${card.id}">${owned ? '✓ Possédée' : 'Marquer possédée'}</button>
      </div>
    `;
    container.appendChild(el);

    el.querySelector('.own-btn').addEventListener('click', () => toggleOwned(card.id));

    if (history.length > 1) {
      requestAnimationFrame(() => drawChart(chartId, history, hasTarget ? card.prix_cible : null));
    }
  });

  loadMoreBtn.style.display = filtered.length > renderedCount ? 'block' : 'none';
}

function drawChart(canvasId, history, target) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const datasets = [
    {
      label: 'Prix',
      data: history.map(h => h.prix_min),
      borderColor: '#5b8cff',
      backgroundColor: 'rgba(91, 140, 255, 0.1)',
      fill: true,
      tension: 0.25,
      pointRadius: 2,
    }
  ];
  if (target != null) {
    datasets.push({
      label: 'Cible',
      data: history.map(() => target),
      borderColor: '#2ecc71',
      borderDash: [4, 4],
      pointRadius: 0,
      fill: false,
    });
  }
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.map(h => new Date(h.date).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' })),
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9a9ea8', font: { size: 9 } }, grid: { color: '#2a2e37' } },
        y: { ticks: { color: '#9a9ea8', font: { size: 9 } }, grid: { color: '#2a2e37' } }
      }
    }
  });
}

loadData().catch(err => {
  document.getElementById('subtitle').textContent = 'Erreur de chargement';
  document.getElementById('cards').innerHTML = '<div class="empty">Impossible de charger les données. ' + err.message + '</div>';
});
</script>
</body>
</html>
