<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi prix Cardmarket - FAB</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0f1115;
    --card-bg: #1a1d24;
    --text: #e8e8ea;
    --text-dim: #9a9ea8;
    --accent: #5b8cff;
    --green: #2ecc71;
    --green-bg: rgba(46, 204, 113, 0.12);
    --border: #2a2e37;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 16px;
    padding-bottom: 48px;
  }
  h1 {
    font-size: 1.3rem;
    margin: 0 0 4px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .card.hit {
    border-color: var(--green);
    background: var(--green-bg);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .card-name {
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0;
  }
  .badge {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge.hit {
    background: var(--green);
    color: #0f1115;
  }
  .badge.miss {
    background: var(--border);
    color: var(--text-dim);
  }
  .price-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-top: 10px;
  }
  .price-current {
    font-size: 1.8rem;
    font-weight: 700;
  }
  .price-current.hit { color: var(--green); }
  .price-target {
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .chart-wrap {
    margin-top: 12px;
    height: 120px;
  }
  .card-footer {
    margin-top: 12px;
    display: flex;
    justify-content: flex-end;
  }
  .cm-link {
    font-size: 0.8rem;
    color: var(--accent);
    text-decoration: none;
  }
  .cm-link:active { opacity: 0.7; }
  .empty {
    color: var(--text-dim);
    text-align: center;
    padding: 40px 20px;
    font-size: 0.9rem;
  }
  .no-data {
    color: var(--text-dim);
    font-size: 0.85rem;
    font-style: italic;
  }
</style>
</head>
<body>
  <h1>Suivi prix Flesh and Blood</h1>
  <div class="subtitle" id="subtitle">Chargement...</div>
  <div id="cards"></div>

<script>
async function loadData() {
  const [cardsRes, pricesRes] = await Promise.all([
    fetch('cards.json?_=' + Date.now()),
    fetch('prices.json?_=' + Date.now())
  ]);
  const cards = await cardsRes.json();
  const prices = await pricesRes.json();
  render(cards, prices);
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
    ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

function render(cards, prices) {
  const container = document.getElementById('cards');
  const subtitle = document.getElementById('subtitle');

  if (!cards.length) {
    subtitle.textContent = 'Aucune carte suivie';
    container.innerHTML = '<div class="empty">Ajoute une carte dans cards.json pour commencer.</div>';
    return;
  }

  subtitle.textContent = cards.length + ' carte' + (cards.length > 1 ? 's' : '') + ' suivie' + (cards.length > 1 ? 's' : '');
  container.innerHTML = '';

  cards.forEach((card, index) => {
    const history = (prices[card.id] || []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));
    const latest = history.length ? history[history.length - 1] : null;
    const hit = latest && latest.prix_min <= card.prix_cible;

    const el = document.createElement('div');
    el.className = 'card' + (hit ? ' hit' : '');

    const chartId = 'chart-' + index;

    el.innerHTML = `
      <div class="card-header">
        <p class="card-name">${card.nom}</p>
        ${latest ? `<span class="badge ${hit ? 'hit' : 'miss'}">${hit ? 'Prix cible atteint' : 'Au-dessus de la cible'}</span>` : ''}
      </div>
      ${latest ? `
        <div class="price-row">
          <span class="price-current ${hit ? 'hit' : ''}">${latest.prix_min.toFixed(2)} €</span>
          <span class="price-target">cible : ${card.prix_cible.toFixed(2)} €</span>
        </div>
        <div class="meta">${latest.nb_vendeurs != null ? latest.nb_vendeurs + ' vendeurs · ' : ''}maj ${formatDate(latest.date)}</div>
        ${history.length > 1 ? `<div class="chart-wrap"><canvas id="${chartId}"></canvas></div>` : ''}
      ` : `
        <div class="no-data">Pas encore de données pour cette carte.</div>
        <div class="price-target">cible : ${card.prix_cible.toFixed(2)} €</div>
      `}
      <div class="card-footer">
        <a class="cm-link" href="${card.url}" target="_blank" rel="noopener">Voir sur Cardmarket &rarr;</a>
      </div>
    `;
    container.appendChild(el);

    if (history.length > 1) {
      requestAnimationFrame(() => drawChart(chartId, history, card.prix_cible));
    }
  });
}

function drawChart(canvasId, history, target) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.map(h => new Date(h.date).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' })),
      datasets: [
        {
          label: 'Prix',
          data: history.map(h => h.prix_min),
          borderColor: '#5b8cff',
          backgroundColor: 'rgba(91, 140, 255, 0.1)',
          fill: true,
          tension: 0.25,
          pointRadius: 2,
        },
        {
          label: 'Cible',
          data: history.map(() => target),
          borderColor: '#2ecc71',
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9a9ea8', font: { size: 9 } }, grid: { color: '#2a2e37' } },
        y: { ticks: { color: '#9a9ea8', font: { size: 9 } }, grid: { color: '#2a2e37' } }
      }
    }
  });
}

loadData().catch(err => {
  document.getElementById('subtitle').textContent = 'Erreur de chargement';
  document.getElementById('cards').innerHTML = '<div class="empty">Impossible de charger les données. ' + err.message + '</div>';
});
</script>
</body>
</html>
